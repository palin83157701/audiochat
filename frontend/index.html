<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Chat Application</title>
    <link rel="stylesheet" href="style.css">
    <!-- Socket.IO client script -->
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <h1>Audio Chat</h1>
        
        <div class="controls">
            <button id="startButton" class="button">Start Chat</button>
            <button id="stopButton" class="button" disabled>Stop Chat</button>
        </div>
        
        <div class="status-container">
            <h3>Status</h3>
            <div id="statusArea" class="status-area">
                <p>Welcome to Audio Chat. Click "Start Chat" to begin.</p>
            </div>
        </div>
        
        <div class="participants-info">
            <p>Connected users: <span id="userCount">0</span></p>
        </div>
    </div>
    
    <!-- Audio chat client script -->
    <script src="audioChat.js"></script>
</body>
</html>
